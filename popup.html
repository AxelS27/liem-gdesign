<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liem gDesign</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="extension-card">
    <!-- Header -->
    <header class="header">
      <div class="brand-left">
        <img src="icon.png" class="logo-img" alt="Liem gDesign Logo">
        <div class="title-group">
          <h1>Liem gDesign</h1>
          <p class="subtitle">Visual & structural X-Ray for web designers & creative developers</p>
        </div>
      </div>
      <div class="header-right">
        <a href="https://github.com/AxelS27/liem-gdesign" target="_blank" class="github-link" title="View Source on GitHub">
          <svg class="icon-git" viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- Content Section -->
    <main class="content-section">
      <div class="domain-row">
        <span class="domain-info" id="domain-info-text">Active Tab: Loading...</span>
      </div>

      <!-- Tab & Toolbar Row -->
      <div class="tab-toolbar-row">
        <div class="tab-group">
          <button class="tab-btn active" id="tab-preview" title="View formatted design document">DESIGN.md</button>
          <button class="tab-btn" id="tab-yaml" title="View raw design token variables">YAML Tokens</button>
          <button class="tab-btn" id="tab-screenshot" title="View captured page screenshot">Screenshot</button>
        </div>
        <div class="control-toolbar">
          <button class="tool-btn" id="btn-copy" title="Copy full DESIGN.md (with YAML Tokens)">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
            </svg>
          </button>
          <button class="tool-btn" id="btn-download" title="Download full DESIGN.md (with YAML Tokens)">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
            </svg>
          </button>
          <button class="tool-btn" id="btn-screenshot" title="Capture full page screenshot">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path fill="currentColor" d="M4 4h3C7.55 4 8 3.55 8 3s-.45-1-1-1H4c-1.1 0-2 .9-2 2v3c0 .55.45 1 1 1s1-.45 1-1V4zm16 0v3c0 .55.45 1 1 1s1-.45 1-1V4c0-1.1-.9-2-2-2h-3c-.55 0-1 .45-1 1s.45 1 1 1h3zM4 20v-3c0-.55-.45-1-1-1s-1 .45-1 1v3c0 1.1.9 2 2 2h3c.55 0 1-.45 1-1s-.45-1-1-1H4zm16 0h-3c-.55 0-1 .45-1 1s.45 1 1 1h3c1.1 0 2-.9 2-2v-3c0-.55-.45-1-1-1s-1 .45-1 1v3zM12 9c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3zm0 4.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
            </svg>
          </button>
          <button class="tool-btn" id="btn-refresh" title="Re-scan active tab">
            <svg viewBox="0 0 24 24" width="14" height="14">
              <path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
            </svg>
          </button>
        </div>
      </div>
      
      <div class="code-preview-box">
        <!-- Tab 1: Rendered Markdown Document -->
        <div id="markdown-code-display" class="tab-content markdown-body active">
          <p>Extracting design DNA from active tab... Please wait.</p>
        </div>
        <!-- Tab 2: Raw YAML Tokens -->
        <pre id="yaml-code-display" class="tab-content code-content" style="display: none;"><code id="yaml-raw-text">Loading YAML tokens...</code></pre>
        <!-- Tab 3: Screenshot Preview -->
        <div id="screenshot-preview-display" class="tab-content" style="display: none; padding: 16px; text-align: center; height: 350px; overflow-y: auto;">
          <p style="color: var(--text-secondary); font-size: 11px; margin-top: 20px;">No screenshot captured yet. Click the camera icon above to capture.</p>
        </div>
      </div>
    </main>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>
</html>
