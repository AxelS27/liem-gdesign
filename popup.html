<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liem gDesign</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="extension-card">
    <!-- Header -->
    <header class="header">
      <div class="brand-left">
        <img src="icon.png" class="logo-img" alt="Liem gDesign Logo">
        <div class="title-group">
          <h1>Liem gDesign</h1>
          <p class="subtitle">Visual & structural X-Ray for web designers & creative developers</p>
        </div>
      </div>
      <div class="header-right">
        <a href="https://github.com/AxelS27/liem-gdesign" target="_blank" class="github-link" title="View Source on GitHub">
          <svg class="icon-git" viewBox="0 0 24 24" width="20" height="20">
            <path fill="currentColor" d="M12 2A10 10 0 0 0 2 12c0 4.42 2.87 8.17 6.84 9.5.5.08.66-.23.66-.5v-1.69c-2.77.6-3.36-1.34-3.36-1.34-.46-1.16-1.11-1.47-1.11-1.47-.9-.62.07-.6.07-.6 1 .07 1.53 1.03 1.53 1.03.9 1.52 2.34 1.07 2.91.83.09-.65.35-1.09.63-1.34-2.22-.25-4.55-1.11-4.55-4.92 0-1.11.38-2 1.03-2.71-.1-.25-.45-1.29.1-2.64 0 0 .84-.27 2.75 1.02.79-.22 1.65-.33 2.5-.33.85 0 1.71.11 2.5.33 1.91-1.29 2.75-1.02 2.75-1.02.55 1.35.2 2.39.1 2.64.65.71 1.03 1.6 1.03 2.71 0 3.82-2.34 4.66-4.57 4.91.36.31.69.92.69 1.85V21c0 .27.16.59.67.5C19.14 20.16 22 16.42 22 12A10 10 0 0 0 12 2z"/>
          </svg>
        </a>
      </div>
    </header>

    <!-- Content Section -->
    <main class="content-section">
      <div class="meta-row">
        <h2 class="section-label">Generated Markdown</h2>
        <span class="domain-info" id="domain-info-text">Active Tab: Loading...</span>
      </div>
      
      <div class="code-preview-box">
        <pre class="code-content"><code id="markdown-code-display">Extracting design DNA from active tab... Please wait.</code></pre>
      </div>

      <!-- Action Buttons Row -->
      <div class="action-bar">
        <button class="action-btn primary" id="btn-copy" title="Copy markdown to clipboard">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/>
          </svg>
          <span id="copy-btn-text">Copy Markdown</span>
        </button>
        
        <button class="action-btn" id="btn-download" title="Download DESIGN.md file">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM17 13l-5 5-5-5h3V9h4v4h3z"/>
          </svg>
          <span>Download</span>
        </button>
        
        <button class="action-btn icon-only" id="btn-refresh" title="Re-scan active tab">
          <svg viewBox="0 0 24 24" width="16" height="16">
            <path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
          </svg>
        </button>
      </div>
    </main>
  </div>

  <script src="popup.js"></script>
</body>
</html>
